fullnameOverride: coprocessor-db-user-setup

imagePullSecrets:
  - name: registry-credentials

serviceAccountName: db-admin

image:
  repository: hub.zama.org/zama-protocol/zama.ai/postgres
  tag: "18-dev"

initContainers:
  - name: fetch-rds-secret
    image:
      repository: hub.zama.org/zama-protocol/zama.ai/aws-cli
      tag: "2.30-dev"
    command: ["/bin/sh", "-c"]
    args:
      - |
        aws secretsmanager get-secret-value \
          --secret-id "$RDS_ADMIN_SECRET_ID" \
          --query SecretString \
          --output text > /shared/rds-master.json
    env:
      - name: RDS_ADMIN_SECRET_ID
        valueFrom:
          configMapKeyRef:
            name: db-admin-config
            key: "RDS_ADMIN_SECRET_ID"
    volumeMounts:
      - name: shared-creds
        mountPath: /shared

job:
  enabled: true
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  restartPolicy: OnFailure
  command:
    - /bin/sh
    - -c
  args:
    - |
      set -euo pipefail

      MASTER_USER=$(jq -r '.username' /shared/rds-master.json)
      MASTER_PASS=$(jq -r '.password' /shared/rds-master.json)

      export PGPASSWORD="$MASTER_PASS"

      psql "host=coprocessor-database.coproc.svc.cluster.local port=5432 user=$MASTER_USER dbname=coprocessor sslmode=require" \
        -v ON_ERROR_STOP=1 \
        -v app_password="$COPROCESSOR_USER_RDS_PASSWORD" \
        -v postgres_exporter_password="$POSTGRES_EXPORTER_PASSWORD" \
        -v sql_exporter_password="$SQL_EXPORTER_PASSWORD" \
        -v master_user="$MASTER_USER" <<'EOSQL'

      -- coprocessor application user
      SELECT EXISTS (
        SELECT 1 FROM pg_roles WHERE rolname = 'coprocessor_user'
      ) AS role_exists \gset

      \if :role_exists
        ALTER ROLE coprocessor_user WITH LOGIN PASSWORD :'app_password';
      \else
        CREATE ROLE coprocessor_user WITH LOGIN PASSWORD :'app_password';
      \endif

      GRANT CONNECT ON DATABASE coprocessor TO coprocessor_user;
      GRANT CREATE ON DATABASE coprocessor TO coprocessor_user;
      GRANT USAGE, CREATE ON SCHEMA public TO coprocessor_user;
      ALTER SCHEMA public OWNER TO coprocessor_user;

      -- postgres-exporter monitoring user
      SELECT EXISTS (
        SELECT 1 FROM pg_roles WHERE rolname = 'postgres_exporter'
      ) AS postgres_exporter_exists \gset

      \if :postgres_exporter_exists
        ALTER ROLE postgres_exporter WITH LOGIN PASSWORD :'postgres_exporter_password';
      \else
        CREATE ROLE postgres_exporter WITH LOGIN PASSWORD :'postgres_exporter_password';
      \endif

      GRANT CONNECT ON DATABASE coprocessor TO postgres_exporter;
      GRANT pg_monitor TO postgres_exporter;

      -- sql-exporter monitoring user (read-only on application data)
      SELECT EXISTS (
        SELECT 1 FROM pg_roles WHERE rolname = 'sql_exporter'
      ) AS sql_exporter_exists \gset

      \if :sql_exporter_exists
        ALTER ROLE sql_exporter WITH LOGIN PASSWORD :'sql_exporter_password';
      \else
        CREATE ROLE sql_exporter WITH LOGIN PASSWORD :'sql_exporter_password';
      \endif

      GRANT CONNECT ON DATABASE coprocessor TO sql_exporter;

      -- Grant read-only access for sql_exporter on all current tables/sequences
      GRANT USAGE ON SCHEMA public TO sql_exporter;
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO sql_exporter;
      GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO sql_exporter;

      -- Set default privileges so future objects created by coprocessor_user are also readable by sql_exporter
      -- master user must be a member of coprocessor_user to ALTER its default privileges
      GRANT coprocessor_user TO :"master_user";

      ALTER DEFAULT PRIVILEGES FOR ROLE coprocessor_user IN SCHEMA public
        GRANT SELECT ON TABLES TO sql_exporter;
      ALTER DEFAULT PRIVILEGES FOR ROLE coprocessor_user IN SCHEMA public
        GRANT SELECT ON SEQUENCES TO sql_exporter;

      EOSQL

env:
  - name: COPROCESSOR_USER_RDS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: coprocessor-user-rds-credentials
        key: password
  - name: POSTGRES_EXPORTER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-exporter-rds-credentials
        key: password
  - name: SQL_EXPORTER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: sql-exporter-rds-credentials
        key: password

volumes:
  - name: shared-creds
    emptyDir:
      medium: Memory

volumeMounts:
  - name: shared-creds
    mountPath: /shared
