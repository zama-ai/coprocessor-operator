fullnameOverride: coprocessor-db-user-setup

imagePullSecrets:
  - name: registry-credentials

serviceAccountName: db-admin

image:
  repository: hub.zama.org/zama-protocol/zama.ai/postgres
  tag: "18-dev"

initContainers:
  - name: fetch-rds-secret
    image:
      repository: hub.zama.org/zama-protocol/zama.ai/aws-cli
      tag: "2.30-dev"
    command: ["/bin/sh", "-c"]
    args:
      - |
        aws secretsmanager get-secret-value \
          --secret-id "$RDS_ADMIN_SECRET_ID" \
          --query SecretString \
          --output text > /shared/rds-master.json
    env:
      - name: RDS_ADMIN_SECRET_ID
        valueFrom:
          configMapKeyRef:
            name: rds-admin-secret-id
            key: "RDS_ADMIN_SECRET_ID"
    volumeMounts:
      - name: shared-creds
        mountPath: /shared

job:
  enabled: true
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  restartPolicy: OnFailure
  command:
    - /bin/sh
    - -c
  args:
    - |
      set -euo pipefail

      apk add --no-cache jq

      MASTER_USER=$(jq -r '.username' /shared/rds-master.json)
      MASTER_PASS=$(jq -r '.password' /shared/rds-master.json)

      export PGPASSWORD="$MASTER_PASS"

      psql "host=coprocessor-database.coproc.svc.cluster.local port=5432 user=$MASTER_USER dbname=coprocessor sslmode=require" \
        -v ON_ERROR_STOP=1 \
        -v app_password="$COPROCESSOR_USER_RDS_PASSWORD" \
        -v exporter_password="$POSTGRES_EXPORTER_RDS_PASSWORD" <<'EOSQL'

      -- coprocessor application user
      SELECT EXISTS (
        SELECT 1 FROM pg_roles WHERE rolname = 'coprocessor_user'
      ) AS role_exists \gset

      \if :role_exists
        ALTER ROLE coprocessor_user WITH LOGIN PASSWORD :'app_password';
      \else
        CREATE ROLE coprocessor_user WITH LOGIN PASSWORD :'app_password';
      \endif

      GRANT CONNECT ON DATABASE coprocessor TO coprocessor_user;
      GRANT CREATE ON DATABASE coprocessor TO coprocessor_user;
      GRANT USAGE, CREATE ON SCHEMA public TO coprocessor_user;
      ALTER SCHEMA public OWNER TO coprocessor_user;

      -- postgres-exporter monitoring user
      SELECT EXISTS (
        SELECT 1 FROM pg_roles WHERE rolname = 'postgres_exporter'
      ) AS exporter_exists \gset

      \if :exporter_exists
        ALTER ROLE postgres_exporter WITH LOGIN PASSWORD :'exporter_password';
      \else
        CREATE ROLE postgres_exporter WITH LOGIN PASSWORD :'exporter_password';
      \endif

      GRANT CONNECT ON DATABASE coprocessor TO postgres_exporter;
      GRANT pg_monitor TO postgres_exporter;

      EOSQL

env:
  - name: COPROCESSOR_USER_RDS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: coprocessor-user-rds-credentials
        key: password
  - name: POSTGRES_EXPORTER_RDS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-exporter-rds-credentials
        key: password

volumes:
  - name: shared-creds
    emptyDir:
      medium: Memory

volumeMounts:
  - name: shared-creds
    mountPath: /shared
