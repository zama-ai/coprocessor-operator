commonConfig:
  databaseUser:
    valueFrom:
      secretKeyRef:
        name: coprocessor-user-rds-credentials
        key: username
  databasePassword:
    valueFrom:
      secretKeyRef:
        name: coprocessor-user-rds-credentials
        key: password
  databaseEndpoint:
    valueFrom:
      configMapKeyRef:
        name: coprocessor-config
        key: DATABASE_ENDPOINT
  databaseUrl: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_ENDPOINT)/coprocessor"
  tracing:
    enabled: true
    endpoint: "http://observability-zws-testnet-observability-alloy.observability.svc.cluster.local:4317"

chains:
  - name: sepolia
    chainId: "11155111"
    aclContractAddressValueFrom:
      configMapKeyRef:
        name: eth-sc-addresses
        key: acl.address
  - name: polygonAmoy
    chainId: "80002"
    aclContractAddressValueFrom:
      configMapKeyRef:
        name: polygon-sc-addresses
        key: acl.address

tfheWorker:
  enabled: true
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/tfhe-worker
    tag: v0.13.0
  replicas: 1
  tracing:
    service: testnet-coprocessor-tfhe-worker
  disabledArgs:
    - health-check-port
  extraArgs:
    - --run-bg-worker
    - --worker-polling-interval-ms=10000
    - --work-items-batch-size=16
    - --dependence-chains-per-batch=100
    - --key-cache-size=32
    - --coprocessor-fhe-threads=64
    - --tokio-threads=16
    - --pg-pool-max-connections=10
    - --log-level=INFO
    - --dcid-ttl-sec=120
    - --dcid-timeslice-sec=240
    - --processed-dcid-ttl-sec=172800
    - --dcid-cleanup-interval-sec=3600
  ports:
    metrics: "9100"
  serviceMonitor:
    enabled: true
  resources:
    requests:
      cpu: 88
      memory: 128Gi
    limits:
      cpu: 88
      memory: 128Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values:
                  - coprocessor-pool
  tolerations:
    - key: karpenter.sh/nodepool
      effect: NoSchedule
      operator: Equal
      value: coprocessor-pool
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

zkProofWorker:
  enabled: true
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/zkproof-worker
    tag: v0.13.0
  replicas: 1
  tracing:
    service: testnet-coprocessor-zkpok-worker
  disabledArgs:
    - metrics-addr
    - health-check-port
  extraArgs:
    - --pg-listen-channel="event_zkpok_new_work"
    - --pg-notify-channel="event_zkpok_computed"
    - --pg-polling-interval=5
    - --pg-pool-connections=5
    - --pg-timeout=15s
    - --worker-thread-count=8
    - --log-level=INFO
  ports:
    metrics: "9100"
  serviceMonitor:
    enabled: true
  resources:
    requests:
      cpu: 28
      memory: 128Gi
    limits:
      cpu: 28
      memory: 128Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values:
                  - coprocessor-pool
  tolerations:
    - key: karpenter.sh/nodepool
      effect: NoSchedule
      operator: Equal
      value: coprocessor-pool
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

snsWorker:
  enabled: true
  image:
    name: hub.zama.org/zama-protocol/zama-ai/fhevm/coprocessor/sns-worker
    tag: v0.13.0
  replicas: 1
  serviceAccountName: sns-worker
  config:
    s3BucketName:
      valueFrom:
        configMapKeyRef:
          name: coprocessor-config
          key: S3_BUCKET_NAME
  tracing:
    service: testnet-coprocessor-sns-worker
  disabledArgs:
    - metrics-addr
    - health-check-port
  extraArgs:
    - --pg-listen-channels
    - event_pbs_computations
    - event_ciphertext_computed
    - --pg-notify-channel
    - event_ciphertext128_computed
    - --work-items-batch-size=20
    - --pg-polling-interval=1
    - --pg-pool-connections=10
    - --pg-timeout=15s
    - --s3-max-concurrent-uploads=100
    - --s3-max-retries-per-upload=100
    - --s3-max-backoff=10s
    - --s3-max-retries-timeout=120s
    - --s3-recheck-duration=2s
    - --s3-regular-recheck-duration=120s
    - --gc-batch-size=80
    - --cleanup-interval=1000000s
    - --liveness-threshold=70s
    - --log-level=INFO
  ports:
    metrics: "9100"
  serviceMonitor:
    enabled: true
  resources:
    requests:
      cpu: 36
      memory: 128Gi
    limits:
      cpu: 36
      memory: 128Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values:
                  - coprocessor-pool
  tolerations:
    - key: karpenter.sh/nodepool
      effect: NoSchedule
      operator: Equal
      value: coprocessor-pool
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

dbMigration:
  enabled: false

gwListener:
  enabled: false

txSender:
  enabled: false
