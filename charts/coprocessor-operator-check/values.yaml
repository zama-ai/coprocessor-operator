checks:
  k8s:
    script: |
      FAILED=0

      check_ns() {
        if kubectl get namespace "$1" &>/dev/null; then
          echo "  ✓ namespace/$1"
        else
          echo "  ✗ namespace/$1  <-- MISSING"
          FAILED=$((FAILED + 1))
        fi
      }

      check_secret() {
        local name=$1 namespace=$2
        if kubectl get secret "$name" --namespace "$namespace" &>/dev/null; then
          echo "  ✓ $namespace/$name"
        else
          echo "  ✗ $namespace/$name  <-- MISSING"
          FAILED=$((FAILED + 1))
        fi
      }

      check_externalname_svc() {
        local name=$1 namespace=$2
        if kubectl get service "$name" --namespace "$namespace" &>/dev/null; then
          SVC_TYPE=$(kubectl get service "$name" --namespace "$namespace" -o jsonpath='{.spec.type}')
          if [ "$SVC_TYPE" = "ExternalName" ]; then
            HOSTNAME=$(kubectl get service "$name" --namespace "$namespace" -o jsonpath='{.spec.externalName}')
            echo "  ✓ $namespace/$name (ExternalName → $HOSTNAME)"
          else
            echo "  ✗ $namespace/$name exists but is type $SVC_TYPE, expected ExternalName"
            FAILED=$((FAILED + 1))
          fi
        else
          echo "  ✗ $namespace/$name  <-- MISSING"
          FAILED=$((FAILED + 1))
        fi
      }

      check_configmap_key() {
        local name=$1 namespace=$2 key=$3
        if kubectl get configmap "$name" --namespace "$namespace" &>/dev/null; then
          VALUE=$(kubectl get configmap "$name" --namespace "$namespace" -o jsonpath="{.data.$key}")
          if [ -n "$VALUE" ]; then
            echo "  ✓ $namespace/$name[$key]"
          else
            echo "  ✗ $namespace/$name exists but key '$key' is missing or empty"
            FAILED=$((FAILED + 1))
          fi
        else
          echo "  ✗ $namespace/$name  <-- MISSING"
          FAILED=$((FAILED + 1))
        fi
      }

      check_configmap() {
        local name=$1 namespace=$2
        if kubectl get configmap "$name" --namespace "$namespace" &>/dev/null; then
          echo "  ✓ $namespace/$name"
        else
          echo "  ✗ $namespace/$name  <-- MISSING"
          FAILED=$((FAILED + 1))
        fi
      }

      echo "┌─────────────────────────────────────────────────"
      echo "│ k8s-check"
      echo "├─────────────────────────────────────────────────"

      echo " -- Namespaces --"
      for NS in coproc coproc-admin gw-blockchain eth-blockchain monitoring; do
        check_ns "$NS"
      done

      echo " -- Secrets --"
      for NS in coproc coproc-admin gw-blockchain eth-blockchain; do
        check_secret coprocessor-user-rds-credentials "$NS"
        check_secret registry-credentials "$NS"
      done
      check_secret postgres-exporter-rds-credentials coproc-admin
      check_secret postgres-exporter-config monitoring
      check_secret sql-exporter-rds-credentials coproc-admin
      check_secret sql-exporter-config monitoring
      check_secret grafana-cloud-credentials monitoring

      echo " -- ExternalName services --"
      check_externalname_svc coprocessor-database coproc

      echo " -- ConfigMaps --"
      check_configmap_key db-admin-config coproc-admin RDS_ADMIN_SECRET_ID
      check_configmap_key db-admin-config coproc-admin AWS_KMS_KEY_ID
      check_configmap_key coprocessor-config coproc DATABASE_ENDPOINT
      check_configmap_key coprocessor-config coproc S3_BUCKET_NAME
      check_configmap_key coprocessor-tx-sender gw-blockchain AWS_KEY_ID
      for NS in coproc coproc-admin gw-blockchain eth-blockchain; do
        check_configmap eth-sc-addresses "$NS"
        check_configmap gw-sc-addresses "$NS"
      done

      if [ "$FAILED" -gt 0 ]; then
        echo "  k8s-check FAILED: $FAILED check(s) — ensure Terraform has run and secrets-bootstrap.sh has been executed"
        echo "└─────────────────────────────────────────────────"
        exit 1
      fi
      echo "  k8s-check passed"
      echo "└─────────────────────────────────────────────────"

  aws:
    # Custom hostname fronting the coprocessor S3 bucket
    storageHostname: ""
    script: |
      echo "┌─────────────────────────────────────────────────"
      echo "│ aws-check"
      echo "├─────────────────────────────────────────────────"

      echo " -- S3 custom hostname --"
      RESPONSE=$(curl -s --max-time 10 "https://${STORAGE_HOSTNAME}")
      HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "https://${STORAGE_HOSTNAME}")
      echo "  https://${STORAGE_HOSTNAME} → $HTTP_STATUS"
      if [ "$HTTP_STATUS" = "200" ] && echo "$RESPONSE" | grep -q "ListBucketResult"; then
        echo "  ✓ S3 bucket reachable and listing confirmed"
      else
        echo "  ✗ expected 200 with ListBucketResult, got $HTTP_STATUS"
        echo "  aws-check FAILED"
        echo "└─────────────────────────────────────────────────"
        exit 1
      fi

      echo "  aws-check passed"
      echo "└─────────────────────────────────────────────────"

  kms:
    script: |
      echo "┌─────────────────────────────────────────────────"
      echo "│ kms-check"
      echo "├─────────────────────────────────────────────────"

      echo " -- tx-sender KMS key (Ethereum address) --"
      cast wallet address --aws

      echo "  kms-check passed"
      echo "└─────────────────────────────────────────────────"

  db:
    script: |
      echo "┌─────────────────────────────────────────────────"
      echo "│ db-check"
      echo "├─────────────────────────────────────────────────"

      MASTER_USER=$(jq -r '.username' /shared/rds-master.json)
      MASTER_PASS=$(jq -r '.password' /shared/rds-master.json)
      export PGPASSWORD="$MASTER_PASS"

      CONN="host=coprocessor-database.coproc.svc.cluster.local port=5432 user=$MASTER_USER dbname=coprocessor sslmode=require"

      echo " -- Roles (excluding system rds_*/pg_*) --"
      psql "$CONN" -c "SELECT rolname, rolcanlogin, rolsuper, rolcreaterole, rolcreatedb FROM pg_roles WHERE rolname NOT LIKE 'rds_%' AND rolname NOT LIKE 'pg_%' ORDER BY rolname;"

      echo " -- Role memberships (non-system) --"
      psql "$CONN" -c "SELECT m.rolname AS role, p.rolname AS member_of FROM pg_auth_members am JOIN pg_roles m ON am.member = m.oid JOIN pg_roles p ON am.roleid = p.oid WHERE m.rolname NOT LIKE 'rds_%' AND m.rolname NOT LIKE 'pg_%' ORDER BY m.rolname, p.rolname;"

      echo " -- Schema ownership (public) --"
      psql "$CONN" -c "SELECT schema_name, schema_owner FROM information_schema.schemata WHERE schema_name = 'public';"

      echo " -- Tables in public (owner) --"
      psql "$CONN" -c "SELECT tablename, tableowner FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"

      echo " -- Default privileges (pg_default_acl) --"
      psql "$CONN" -c "SELECT pg_get_userbyid(d.defaclrole) AS for_role, n.nspname AS schema, d.defaclobjtype AS objtype, d.defaclacl AS acl FROM pg_default_acl d JOIN pg_namespace n ON d.defaclnamespace = n.oid ORDER BY for_role, schema;"

      echo " -- ciphertexts table + ownership --"
      OWNER=$(psql "$CONN" -tAc "SELECT tableowner FROM pg_tables WHERE schemaname='public' AND tablename='ciphertexts';")
      if [ "$OWNER" = "coprocessor_user" ]; then
        echo "  ✓ public.ciphertexts owned by coprocessor_user"
      else
        if [ -z "$OWNER" ]; then
          echo "  ✗ public.ciphertexts NOT FOUND  <-- run rds-ciphertext-restore"
        else
          echo "  ✗ public.ciphertexts owner is '$OWNER', expected 'coprocessor_user'"
        fi
        echo "  db-check FAILED"
        echo "└─────────────────────────────────────────────────"
        exit 1
      fi

      echo "  db-check passed"
      echo "└─────────────────────────────────────────────────"

kubeUtils:
  image:
    repository: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/kube-utils
    tag: v0.4.0

awsCli:
  image:
    repository: hub.zama.org/zama-protocol/zama.ai/aws-cli
    tag: "2.30-dev"

ethFoundry:
  image:
    repository: hub.zama.org/zama-protocol/zama-ai/security-hub/infra/eth-foundry
    tag: "0.3.1"

postgres:
  image:
    repository: hub.zama.org/zama-protocol/zama.ai/postgres
    tag: "18-dev"

kubectl:
  image:
    repository: hub.zama.org/zama-protocol/zama.ai/kubectl
    tag: "1.34-dev"

job:
  ttlSecondsAfterFinished: 300

# Extra labels applied to the check Job's pod template (e.g. for SecurityGroupPolicy selectors).
podLabels: {}

# Pod-level security context (e.g. fsGroup, runAsGroup).
podSecurityContext: {}

# Container-level security context applied to every container in the check job.
# Dropping all capabilities is safe even for containers that run as root (e.g. apk add).
securityContext:
  capabilities:
    drop:
      - ALL

imagePullSecrets:
  - name: registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: "db-admin"

nodeSelector: {}
tolerations: []
affinity: {}
