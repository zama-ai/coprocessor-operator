apiVersion: batch/v1
kind: Job
metadata:
  name: coprocessor-operator-check-infra-config
  labels:
    app: coprocessor-operator-check
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished | int }}
  template:
    metadata:
      labels:
        app: coprocessor-operator-check
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      volumes:
        - name: shared-creds
          emptyDir:
            medium: Memory
      initContainers:
        - name: k8s-check
          image: {{ .Values.kubectl.image.repository }}:{{ .Values.kubectl.image.tag }}
          imagePullPolicy: Always
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              echo "{{ .Chart.Name }}:{{ .Chart.Version }}"
              {{- .Values.checks.k8s.script | nindent 14 }}
        - name: aws-check
          image: {{ .Values.kubeUtils.image.repository }}:{{ .Values.kubeUtils.image.tag }}
          imagePullPolicy: Always
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              {{- .Values.checks.aws.script | nindent 14 }}
          env:
            - name: STORAGE_HOSTNAME
              value: {{ .Values.checks.aws.storageHostname }}
        - name: fetch-rds-secret
          image: {{ .Values.awsCli.image.repository }}:{{ .Values.awsCli.image.tag }}
          imagePullPolicy: Always
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              aws secretsmanager get-secret-value \
                --secret-id "$RDS_SECRET_ARN" \
                --query SecretString \
                --output text > /shared/rds-master.json
          env:
            - name: RDS_SECRET_ARN
              value: {{ .Values.checks.db.rdsSecretArn }}
          volumeMounts:
            - name: shared-creds
              mountPath: /shared
      containers:
        - name: db-check
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: Always
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              {{- .Values.checks.db.script | nindent 14 }}
          volumeMounts:
            - name: shared-creds
              mountPath: /shared
